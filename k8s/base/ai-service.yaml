apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: healthcare
  labels:
    app: ai-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: ghcr.io/alomranehala-sketch/healthcare/ai-service:latest
          ports:
            - containerPort: 3005
          envFrom:
            - configMapRef:
                name: healthcare-config
            - secretRef:
                name: healthcare-secrets
          env:
            - name: PORT
              value: '3005'
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3005
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: healthcare
spec:
  selector:
    app: ai-service
  ports:
    - port: 3005
      targetPort: 3005
