apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: healthcare
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/alomranehala-sketch/healthcare/auth-service:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: healthcare-config
            - secretRef:
                name: healthcare-secrets
          env:
            - name: PORT
              value: '3001'
            - name: JWT_EXPIRATION
              value: '15m'
            - name: JWT_REFRESH_EXPIRATION
              value: '7d'
            - name: GOOGLE_CALLBACK_URL
              value: 'https://api.healthcare.example.com/api/v1/auth/google/callback'
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: healthcare
spec:
  selector:
    app: auth-service
  ports:
    - port: 3001
      targetPort: 3001
