apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: healthcare
  labels:
    app: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: ghcr.io/OWNER/REPO/user-service:latest
          ports:
            - containerPort: 3003
          envFrom:
            - configMapRef:
                name: healthcare-config
            - secretRef:
                name: healthcare-secrets
          env:
            - name: PORT
              value: '3003'
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: healthcare
spec:
  selector:
    app: user-service
  ports:
    - port: 3003
      targetPort: 3003
