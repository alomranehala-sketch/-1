apiVersion: v1
kind: ConfigMap
metadata:
  name: healthcare-config
  namespace: healthcare
data:
  NODE_ENV: "production"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "healthcare_platform"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  AUTH_SERVICE_URL: "http://auth-service:3001"
  USER_SERVICE_URL: "http://user-service:3003"
  HEALTH_SERVICE_URL: "http://health-service:3004"
  AI_SERVICE_URL: "http://ai-service:3005"
  NOTIFICATION_SERVICE_URL: "http://notification-service:3006"
  EMERGENCY_SERVICE_URL: "http://emergency-service:3002"
  ADMIN_SERVICE_URL: "http://admin-service:3007"
  RATE_LIMIT_TTL: "60"
  RATE_LIMIT_MAX: "100"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_FROM: "noreply@healthcare.com"
  OPENAI_MODEL: "gpt-4"
